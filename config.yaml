execution:
  default_commission_rate: 0.0025
  enable_hk_trading: true
  enable_us_trading: true
  hk_commission_rate: 0.0025
  initial_capital: 15000.0
  max_cost_ratio: 1.8
  max_daily_orders: 200
  max_drawdown_pct: 10.0
  max_position_size: 2000.0
  min_profit_threshold: 2.5
  min_trade_value: 200
  order_tracking:
    check_interval: 30
    max_pending_orders: 8
    retry_count: 1
    smart_pricing: true
    timeout: 120
  order_types:
    default: LO
  preferred_currency: HKD
  price_adjust_rate:
    buy: 0.003
    sell: 0.003
  profit_taking:
    enable: true
    fixed_profit_pct: 15.0
    partial_profit_pct: 8.0
    trailing_profit_pct: 5.0
    trailing_profit_step: 1.0
  risk_control:
    daily_loss_pct: 3.0
    max_correlation: 0.7
    position_pct: 2.0
    volatility_threshold: 0.25
    max_daily_loss_pct: 3.0        # 日亏损限制（占总权益百分比）
    max_total_position_pct: 80.0   # 总仓位限制（占总权益百分比）
  # 资金守卫配置
  min_reserve: 1000                # 最小储备金（保留不交易的金额）
  small_trade_max_cost_ratio: 2.5
  small_trade_threshold: 800
  stop_loss:
    emergency_stop_pct: 15.0
    enable: true
    fixed_stop_pct: 8.0
    max_loss_per_day: 5.0
    trailing_stop_pct: 3.0
  trailing_stop_pct: 2.0
  us_commission_rate: 0.005
  us_platform_fee: 0.99
logging:
  file: ./logs/trading.log
  level: DEBUG
portfolio:
  allocation_strategy: signal_strength_weight
  cash_reserve_ratio: 0.15
  max_position_weight: 0.08
  min_position_weight: 0.05
  rebalance_frequency: 1800
  rebalance_threshold: 0.2
  signal_weight_factor: 2.0
quote:
  data_quality_threshold: 0.5
  historical_days: 1250
  sub_types:
  - Quote
  symbols:
  - 700.HK
  - 9988.HK
  - 1299.HK
  - 388.HK
  - 941.HK
  - AAPL.US
  - GOOGL.US
  - MSFT.US
  - NVDA.US
  - TSLA.US
  use_mock_data: false
strategy:
  lookback_period: 90
  model_path: ./models/lstm_model.h5
  risk_management:
    correlation_limit: 0.7
    max_positions: 8
    sector_limit: 0.4
    volatility_filter: 0.3
  signal_interval: 600
  signal_processing:
    buy_threshold: 0.04
    confidence_threshold: 0.1
    enable_hold: true
    min_signal_strength: 0.02
    sell_threshold: -0.04
    signal_decay_factor: 0.95
    trend_confirmation: true
    volume_confirmation: true
  # 信号过滤器配置 - 防止重复信号和过度交易
  signal_cooldown: 600           # 同一股票相同信号冷却期（秒）
  max_signals_per_day: 10        # 每个股票每日最大信号数量
  price_change_threshold: 0.01   # 价格变化阈值（1%）才生成新信号
  # 相关性过滤器配置 - 风险分散
  correlation_lookback_days: 60  # 相关性计算回看天数
  correlation_update_interval: 24 # 相关性矩阵更新间隔（小时）
  # Attention-LSTM 模型配置
  model:
    lstm_units: 64               # LSTM隐藏单元数
    attention_units: 32          # 注意力机制单元数
    dropout_rate: 0.3            # Dropout率
    learning_rate: 0.001         # 学习率
    l1_reg: 0.0001               # L1正则化系数
    l2_reg: 0.0001               # L2正则化系数
ensemble:
  enable: true
  method: confidence_weight  # equal_weight, confidence_weight, performance_weight, dynamic_weight
  min_strategies_agreement: 1  # 降低到1，让单个强信号也能触发
  confidence_threshold: 0.02   # 进一步降低置信度阈值，让更多信号通过
  reweight_frequency: 100
  strategies:
    - lstm
    - technical  # 可以添加更多策略
  training:
    batch_size: 64
    early_stopping_patience: 15
    epochs: 200
    features:
    - close
    - volume
    - high
    - low
    - turnover
    - rsi
    - macd
    - bollinger_bands
    - sma_20
    - ema_12
    force_retrain: true
    model_architecture:
      activation: relu
      dropout_rate: 0.3
      learning_rate: 0.0005
      lstm_units:
      - 128
      - 64
      - 32
      recurrent_dropout: 0.2
    test_size: 0.2
    validation_split: 0.15
