api:
  access_token: ${LONGPORT_ACCESS_TOKEN}
  app_key: ${LONGPORT_APP_KEY}
  app_secret: ${LONGPORT_APP_SECRET}
  base_url: ${API_BASE_URL}
  quote_ws_url: ${API_WS_URL}
execution:
  default_commission_rate: 0.0025
  enable_hk_trading: true
  enable_us_trading: true
  # 美股扩展交易时段配置
  us_extended_hours:
    enable_pre_market: true       # 启用盘前交易 (4:00-9:30 ET)
    enable_after_hours: true      # 启用盘后交易 (16:00-20:00 ET)
    enable_overnight: false       # 隔夜交易（暂不支持）
    pre_market_start: "04:00"     # 盘前开始时间
    pre_market_end: "09:30"       # 盘前结束时间
    after_hours_start: "16:00"    # 盘后开始时间
    after_hours_end: "20:00"      # 盘后结束时间
  # 做空交易配置（仅美股支持）
  allow_sell_to_short: true       # SELL 无持仓时自动转为 SHORT（仅美股生效）
  strict_validation: true         # 验证异常时拒绝交易（fail-closed）
  enable_short_selling: true      # 启用做空交易
  max_short_position: 100         # 单只股票最大空头持仓
  max_total_short_exposure: 50000 # 总空头敞口限制（美元）
  short_margin_requirement: 1.5   # 做空保证金要求（150%）
  lot_sizes:
    700.HK: 100
    9988.HK: 100
    388.HK: 100
    941.HK: 500
    9992.HK: 200
  hk_commission_rate: 0.0025
  initial_capital: 15000.0
  max_cost_ratio: 1.8
  max_daily_orders: 999999
  max_drawdown_pct: 10.0
  max_position_size: 2000.0
  min_profit_threshold: 2.5
  min_trade_value: 200
  order_tracking:
    check_interval: 30
    max_pending_orders: 8
    retry_count: 1
    smart_pricing: true
    timeout: 120
  order_types:
    default: LO
  preferred_currency: HKD
  price_adjust_rate:
    buy: 0.003
    sell: 0.003
  profit_taking:
    enable: true
    fixed_profit_pct: 15.0
    partial_profit_pct: 8.0
    trailing_profit_pct: 5.0
    trailing_profit_step: 1.5
  risk_control:
    daily_loss_pct: 3.0
    max_correlation: 0.7
    position_pct: 5.0
    volatility_threshold: 0.25
    max_daily_loss_pct: 3.0        # 日亏损限制（占总权益百分比）
    max_total_position_pct: 80.0   # 总仓位限制（占总权益百分比）
    max_single_position_pct: 20.0  # 单一标的最大持仓比例（占总权益百分比）
    max_leverage: 2.5              # 最大杠杆倍数（总持仓/净资产），当前2.31x
    margin_warning_pct: 35.0       # 保证金缓冲预警线（净资产-维持保证金）/净资产
    margin_danger_pct: 25.0        # 保证金缓冲危险线，触发建议减仓
    # P2-14: 半凯利动态仓位 — 根据近 N 日 orders.csv 已成交订单 PnL 调整 position_pct
    kelly_sizing:
      enable: true
      lookback_days: 30   # 回看天数
      min_trades: 10      # 最少样本数，少于则回退基础 position_pct
      min_pct: 1.0        # 钳制下界 (%)
      max_pct: 10.0       # 钳制上界 (%)
      refresh_hours: 6    # 多久刷新一次
  # 资金守卫配置
  min_reserve: 1000                # 最小储备金（保留不交易的金额）
  small_trade_max_cost_ratio: 2.5
  small_trade_threshold: 800
  stop_loss:
    emergency_stop_pct: 10.0
    enable: true
    fixed_stop_pct: 5.0
    max_loss_per_day: 3.0
    trailing_stop_pct: 4.0
    # P1-7: ATR 动态止损 — 高波动标的拉宽止损，低波动收紧
    atr_dynamic:
      enable: true
      period: 14            # ATR 计算回看天数
      multiplier: 2.0       # stop_distance = max(fixed_pct, multiplier × ATR%)
  leveraged_symbols: []
  leveraged_overrides: {}
  # P1-6: 按市场分组的覆盖配置（覆盖上方全局 stop_loss/profit_taking/price_adjust_rate/signal_cooldown）
  # 港股波动较大，止损放宽；美股流动性好，止损可紧。
  market_overrides:
    hk:
      stop_loss:
        fixed_stop_pct: 6.0
        emergency_stop_pct: 12.0
        trailing_stop_pct: 5.0
      profit_taking:
        fixed_profit_pct: 18.0
        partial_profit_pct: 9.0
        trailing_profit_pct: 5.5
        trailing_profit_step: 1.8
      price_adjust_rate:
        buy: 0.004
        sell: 0.004
      signal_cooldown: 90       # 港股冷却稍长，避免午盘集合竞价噪声反复触发
    us:
      stop_loss:
        fixed_stop_pct: 4.0
        emergency_stop_pct: 8.0
        trailing_stop_pct: 3.5
      profit_taking:
        fixed_profit_pct: 12.0
        partial_profit_pct: 7.0
        trailing_profit_pct: 4.0
        trailing_profit_step: 1.2
      price_adjust_rate:
        buy: 0.003
        sell: 0.003
      signal_cooldown: 60
  us_commission_rate: 0.005
  us_platform_fee: 0.99
logging:
  file: ./logs/trading.log
  level: DEBUG
portfolio:
  allocation_strategy: signal_strength_weight
  cash_reserve_ratio: 0.15
  max_position_weight: 0.08
  min_position_weight: 0.05
  rebalance_frequency: 1800
  rebalance_threshold: 0.2
  signal_weight_factor: 2.0
quote:
  data_quality_threshold: 0.5
  historical_days: 1250
  sub_types:
  - Quote
  symbols:
  - 700.HK
  - 9988.HK
  - 388.HK
  - 941.HK
  - 9992.HK
  - AAPL.US
  - GOOGL.US
  - MSFT.US
  - NVDA.US
  - TSLA.US
  - MU.US
  - SNDK.US
  use_mock_data: false
strategy:
  lookback_period: 90
  breakout:
    lookback_days: 20
    atr_period: 14
    margin_pct: 0.002
  model_path: ./models/lstm_model.h5
  training:
    features:
      - close
      - volume
      - high
      - low
      - turnover
  risk_management:
    correlation_limit: 0.7
    max_positions: 8
    sector_limit: 0.4
    volatility_filter: 0.3
  signal_interval: 600
  signal_processing:
    buy_threshold: 0.04
    # P2-12 输出门：合成信号 confidence 低于此阈值即不下单（覆盖见 trigger_confidence_overrides）
    confidence_threshold: 0.08
    enable_hold: true
    min_signal_strength: 0.02
    sell_threshold: -0.04
    signal_decay_factor: 0.95
    trend_confirmation: true
    volume_confirmation: true
    # 按触发策略覆写置信度阈值（低于全局 confidence_threshold 时单独放宽）
    # 适用场景：CCASS 单标的信号置信度天然较低（约 0.06-0.10），
    # 全局 0.08 阈值会过滤掉绝大多数 CCASS 信号
    trigger_confidence_overrides:
      ccass: 0.05  # CCASS 港股持仓变化信号阈值
  # SELL → BUY 回补价护栏（24h 内同标的反向 BUY 价不得高于最近 SELL 价）
  cover_price_guard:
    enable: true
    lookback_hours: 24            # 回看时长（小时）
    max_price_premium_pct: 0.0    # BUY 价相对最近 SELL 价的最大溢价比例，0 表示必须 ≤ SELL 价
  # 信号过滤器配置 - 触发驱动模式下仅做去重，不限流
  signal_cooldown: 60             # 同一股票相同信号去重窗口（秒）
  stop_loss_reentry_cooldown: 3600  # 止损后再入场冷却期（秒），防止止损→买入→止损循环
  max_signals_per_day: 10        # 每个股票每日最大信号数量
  min_holding_seconds: 300       # 最小持仓时间（秒），防止秒级买卖
  price_change_threshold: 0.003  # 价格变化阈值（0.3%）才生成新信号
  hk_open_filter_minutes: 10    # 港股开盘后N分钟内过滤BUY信号（集合竞价噪声）
  # P1-10: 美股开盘后 N 分钟与盘后 19:30-20:00 过滤 BUY（流动性差、点差宽）
  us_open_filter_minutes: 15
  us_after_hours_buy_filter: true
  # 相关性过滤器配置 - 风险分散
  correlation_lookback_days: 60  # 相关性计算回看天数
  correlation_update_interval: 24 # 相关性矩阵更新间隔（小时）
  # Attention-LSTM 模型配置
  model:
    lstm_units: 64               # LSTM隐藏单元数
    attention_units: 32          # 注意力机制单元数
    dropout_rate: 0.3            # Dropout率
    learning_rate: 0.001         # 学习率
    l1_reg: 0.0001               # L1正则化系数
    l2_reg: 0.0001               # L2正则化系数
# 股票发现模块配置
discovery:
  enable: true                    # 是否启用股票发现
  scan_interval: 3600             # 扫描间隔（秒），默认1小时
  min_volume: 1000000             # 最小成交量
  rsi_oversold: 30                # RSI超卖阈值
  rsi_overbought: 70              # RSI超买阈值
  min_confidence: 0.6             # 最小置信度
  watch_expiry_hours: 48          # 观察过期时间（小时）
  max_watch_list: 20              # 最大观察列表大小
  auto_trade: false               # 已集成到 ensemble，发现模块仅做提醒
  # 自定义股票池（可选，不配置则使用默认池）
  # hk_pool:
  #   - "700.HK"
  #   - "9988.HK"
  # us_pool:
  #   - "AAPL.US"
  #   - "NVDA.US"

# 异常成交量检测配置
volume_anomaly:
  enable: true
  check_interval: 60              # 信号生成间隔（秒）
  surge_multiplier: 3.0           # 成交量激增阈值（3x日均量）
  spike_std_threshold: 2.5        # 成交量突刺标准差阈值
  block_trade_pct: 0.5            # 大宗交易阈值（日均量的0.5%在单次推送内）
  divergence_volume_ratio: 2.0    # 量价背离：成交速率需超过均值的倍数
  divergence_price_threshold: 0.003  # 量价背离：价格变动上限（0.3%算作"平"）
  lookback_days: 30               # 历史基线计算天数
  min_anomaly_confidence: 0.5     # 最小信号置信度
  signal_expiry_minutes: 30       # 信号有效期（分钟）
  auto_trade: false               # 已集成到 ensemble，不再直接下单

# 机构交易跟踪配置
institutional:
  enable: true                       # 是否启用机构跟踪
  scan_interval: 7200                # 扫描间隔（秒），默认2小时
  user_email: "research@example.com" # SEC EDGAR 要求的联系邮箱
  insider_days: 30                   # 内部人交易回看天数
  min_transaction_value: 100000      # 最小交易金额过滤（美元）
  insider_buy_confidence_boost: 0.15 # 内部人买入信号置信度加成
  min_institutions_buying: 2         # 触发信号的最少机构数
  signal_expiry_hours: 48              # SEC 信号有效期（小时）
  auto_trade: false                    # 已集成到 ensemble，不再直接下单

# CCASS 港股中央结算持仓追踪
ccass:
  enable: true                         # 是否启用 CCASS 追踪
  scan_interval: 7200                  # 扫描间隔（秒），默认2小时
  min_change_pct: 0.5                  # 触发信号的最小持仓变化百分比
  lookback_days: 5                     # 对比回看天数
  top_n: 10                            # 追踪前N名参与者
  signal_expiry_hours: 24              # 信号有效期（小时）

  # 跟踪的机构（默认全部跟踪，也可指定子集）
  tracked_institutions:
    - berkshire_hathaway    # 巴菲特 - Berkshire Hathaway
    - bridgewater           # 达里奥 - Bridgewater Associates
    - renaissance           # 文艺复兴科技
    - citadel               # 城堡投资
    - two_sigma             # Two Sigma
    - point72               # 科恩 - Point72
    - blackrock             # 贝莱德
    - jpmorgan              # 摩根大通
    - goldman_sachs         # 高盛
    - morgan_stanley        # 摩根士丹利
    - soros                 # 索罗斯基金
    - appaloosa             # 泰珀 - Appaloosa

ensemble:
  enable: true
  method: confidence_weight
  min_strategies_agreement: 2
  # P2-12 双门禁分层：
  #   ensemble.confidence_threshold = 输入门（过滤单策略的极弱信号，建议 ≤ 0.05）
  #   strategy.signal_processing.confidence_threshold = 输出门（最终是否下单，建议 ≥ 0.08）
  # 触发驱动模式下，输入门保持低位以保留所有候选信号，输出门把控最终质量。
  confidence_threshold: 0.02
  reweight_frequency: 100
  # P2-13 Pyramid 加仓：已盈利 ≥ min_profit_pct% 且再次出现同向触发时，suggested_quantity × (1 + boost_pct)
  pyramid:
    enable: true
    min_profit_pct: 5.0
    boost_pct: 0.5
  # P2-15 策略权重 PnL 反馈：每日聚合 orders.csv 中各 signal_source 胜率，平滑调整 strategy_weights
  weight_feedback:
    enable: true
    lookback_days: 14
    min_trades_per_source: 3
    alpha: 0.3                # EWMA 学习率（0=不更新, 1=完全用最新, 0.3=温和反馈）
    refresh_hours: 24
  # P1-8: 波动率自适应仓位（高波动收紧、低波动放大）
  position_sizing:
    vol_adaptive: true
    target_vol_pct: 1.5        # 目标日波动率 1.5%
    scale_min: 0.5             # 最低仓位缩放（避免过度收紧）
    scale_max: 1.3             # 最高仓位放大（仍受 fund_guard 单标的上限保护）
  strategy_weights:
    lstm: 0.10
    technical: 0.10
    sec: 0.20
    volume_anomaly: 0.30
    breakout: 0.10
    ccass: 0.20
  # 触发策略：只有这些策略产生BUY/SELL时才能发起交易
  trigger_strategies:
    - volume_anomaly
    - sec
    - ccass
  # 辅助策略：仅用于确认方向和调节置信度，不能独立触发交易
  auxiliary_strategies:
    - lstm
    - technical
    - breakout
  strategies:
    - lstm
    - technical
    - sec
    - volume_anomaly
    - breakout
    - ccass
  training:
    batch_size: 64
    early_stopping_patience: 15
    epochs: 200
    features:
    - close
    - volume
    - high
    - low
    - turnover
    - rsi
    - macd
    - bollinger_bands
    - sma_20
    - ema_12
    force_retrain: true
    model_architecture:
      activation: relu
      dropout_rate: 0.3
      learning_rate: 0.0005
      lstm_units:
      - 128
      - 64
      - 32
      recurrent_dropout: 0.2
    test_size: 0.2
    validation_split: 0.15
