global:
  scrape_interval: 15s
  evaluation_interval: 15s

alerting:
  alertmanagers:
    - static_configs:
        - targets:
          # - alertmanager:9093

rule_files:
  # - "first_rules.yml"
  # - "second_rules.yml"

scrape_configs:
  - job_name: "prometheus"
    static_configs:
      - targets: ["localhost:9090"]

  - job_name: "longbridge-quant"
    scrape_interval: 5s
    static_configs:
      - targets: ["quant-trader:8000"]
        labels:
          instance: "quant-trader"
          service: "trading-system" 